<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microsoft Fabric - Dynamic Universe</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f0f7ff;
        overflow: hidden;
    }

    .svg-bg {
        position: fixed;
        width: 100vw;
        height: 100vh;
        left: 0;
        top: 0;
        z-index: 0;
    }

    .slides-container {
        width: 100vw;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 2;
    }

    .universe-section {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        position: relative;
    }

    .universe-title {
        font-size: clamp(2.8rem, 4.5vw, 4rem);
        font-weight: 900;
        color: #1a2b4c;
        margin-top: 8vh;
        margin-bottom: 4vh;
        text-align: center;
        letter-spacing: -0.03em;
        opacity: 0;
        transform: translateY(30px);
    }

    .universe-canvas {
        position: relative;
        width: 90vw;
        max-width: 1600px;
        height: 70vh;
        min-height: 450px;
        margin: 0 auto;
    }

    .universe-icon {
        position: absolute;
        transition: transform 0.3s cubic-bezier(0.2, 1.5, 0.4, 1), box-shadow 0.2s, filter 0.2s, opacity 0.3s;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 22%;
        z-index: 2;
        cursor: pointer;
        box-shadow: 0 10px 25px 0 rgba(0, 180, 200, 0.15);
        filter: drop-shadow(0 5px 15px rgba(0, 200, 220, 0.1));
        width: 82px;
        height: 82px;
        visibility: hidden;
    }

    .universe-icon:hover,
    .universe-icon:focus {
        opacity: 1 !important;
        transform: scale(1.2) rotate(-8deg) !important;
        z-index: 10;
        filter: drop-shadow(0 15px 40px rgba(0, 220, 255, 0.6)) brightness(1.1);
        box-shadow: 0 15px 35px 0 rgba(0, 180, 200, 0.25);
    }

    .icon-main {
        left: 50.5%;
        top: 48%;
        width: 115px;
        height: 115px;
        z-index: 9;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 40px 0 rgba(100, 255, 230, 0.8);
        visibility: hidden;
    }

    .icon1  {left:12%;  top:28%; width:70px; height:70px;}
    .icon2  {left:27%;  top:6%;  width:78px; height:78px;}
    .icon3  {left:66%;  top:11%; width:82px; height:82px;}
    .icon4  {left:84%;  top:37%; width:69px; height:69px;}
    .icon5  {left:74%;  top:67%; width:68px; height:68px;}
    .icon6  {left:58%;  top:80%; width:76px; height:76px;}
    .icon7  {left:37%;  top:83%; width:67px; height:67px;}
    .icon8  {left:11%;  top:63%; width:70px; height:70px;}
    .icon9  {left:8%;   top:46%; width:57px; height:57px; opacity:.61;}
    .icon10 {left:21%;  top:38%; width:68px; height:68px; opacity:.71;}
    .icon11 {left:20%;  top:76%; width:56px; height:56px; opacity:.61;}
    .icon12 {left:33%;  top:53%; width:62px; height:62px; opacity:.77;}
    .icon13 {left:57%;  top:20%; width:55px; height:55px; opacity:.69;}
    .icon14 {left:45%;  top:7%;  width:58px; height:58px; opacity:.63;}
    .icon15 {left:87%;  top:59%; width:57px; height:57px; opacity:.63;}
    .icon16 {left:71%;  top:33%; width:61px; height:61px; opacity:.71;}
    .icon17 {left:54%;  top:72%; width:66px; height:66px; opacity:.75;}
    .icon18 {left:40%;  top:23%; width:61px; height:61px; opacity:.68;}
    .icon19 {left:60%;  top:56%; width:63px; height:63px; opacity:.69;}
    .icon20 {left:79%;  top:47%; width:60px; height:60px; opacity:.62;}
    .icon21 {left:76%;  top:19%; width:61px; height:61px; opacity:.62;}
    .icon22 {left:66%;  top:88%; width:61px; height:61px; opacity:.68;}
    .icon23 {left:85%;  top:76%; width:63px; height:63px; opacity:.67;}
    .icon24 {left:13%;  top:13%; width:55px; height:55px; opacity:.67;}
    .icon25 {left:31%;  top:26%; width:58px; height:58px; opacity:.63;}
    .icon26 {left:92%;  top:32%; width:50px; height:50px; opacity:.53;}
    .icon27 {left:80%;  top:83%; width:59px; height:59px; opacity:.54;}
    .icon28 {left:41%;  top:74%; width:58px; height:58px; opacity:.60;}
    .icon29 {left:88%;  top:17%; width:56px; height:56px; opacity:.54;}
    .icon30 {left:30%;  top:91%; width:48px; height:48px; opacity:.48;}

    .demo-canvas-next {
        position: absolute;
        top: 3vh;
        font-size: 1.1rem;
        font-weight: 600;
        background: linear-gradient(95deg, #10c6a8, #4ab5e0);
        color: white;
        padding: 0.5em 1.6em;
        border: none;
        border-radius: 1.5em;
        cursor: pointer;
        box-shadow: 0 4px 15px 0 rgba(0, 200, 180, 0.2);
        letter-spacing: 0.04em;
        z-index: 10;
        transition: all 0.2s ease-in-out;
        opacity: 0;
        transform: translateY(-20px);
    }
    .demo-canvas-next.prev { left: 3vw; }
    .demo-canvas-next.next { right: 3vw; }
    .demo-canvas-next:hover {
        filter: brightness(1.15);
        transform: translateY(-23px) scale(1.05);
        box-shadow: 0 8px 25px 0 rgba(0, 200, 180, 0.3);
    }

.fabric-glow {
  box-shadow:
    0 0 0 4px #fff,                   /* subtle white inner border for pop */
    0 0 18px 4px #12e7f6,             /* bright outer glow */
    0 0 40px 9px #29b6f6;             /* soft blue far glow */
  border: 3px solid #00d1ff;
  transition: box-shadow 0.2s, border 0.2s;
  z-index: 100 !important;
}

    @media (max-width: 900px) {.universe-canvas {width:98vw;min-height:220px;}.universe-icon {width:43px;height:43px;}.icon-main{width:63px;height:63px;}}
  </style>
</head>
<body>

  <svg class="svg-bg" preserveAspectRatio="xMidYMid slice" viewBox="0 0 100 100">
      <defs>
          <radialGradient id="Gradient1" cx="50%" cy="50%" fx="10%" fy="50%" r=".5">
              <animate attributeName="fx" dur="34s" values="0%;3%;0%" repeatCount="indefinite" />
              <stop offset="0%" stop-color="#89f7fe" />
              <stop offset="100%" stop-color="#89f7fe00" />
          </radialGradient>
          <radialGradient id="Gradient2" cx="50%" cy="50%" fx="10%" fy="50%" r=".5">
              <animate attributeName="fx" dur="23.5s" values="-3%;3%;-3%" repeatCount="indefinite" />
              <stop offset="0%" stop-color="#a6c1ee" />
              <stop offset="100%" stop-color="#a6c1ee00" />
          </radialGradient>
      </defs>
      <rect x="0" y="0" width="100%" height="100%" fill="url(#Gradient1)">
          <animate attributeName="x" dur="20s" values="0%;-25%;0%" repeatCount="indefinite" />
          <animate attributeName="y" dur="21s" values="0%;25%;0%" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="100s" repeatCount="indefinite" />
      </rect>
      <rect x="0" y="0" width="100%" height="100%" fill="url(#Gradient2)">
          <animate attributeName="x" dur="23s" values="-25%;0%;-25%" repeatCount="indefinite" />
          <animate attributeName="y" dur="24s" values="25%;0%;25%" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="120s" repeatCount="indefinite" />
      </rect>
  </svg>

  <div class="slides-container">
    <section class="slide active" id="slide-4">
      <button class="demo-canvas-next prev" onclick="location.href='/present/slide-3'">‹ Prev</button>
      <button class="demo-canvas-next next" onclick="location.href='/present/slide-5'">Next ›</button>
      <div class="universe-section">
        <div class="universe-title">The Universe of Microsoft Fabric</div>
          <button id="highlight-fabric-stack"
          style="position: absolute; right: 4vw; top: 7vh; z-index: 20; font-size: 1.08rem; font-weight: 600; background:linear-gradient(90deg,#173b62,#27d6cb);color:white;padding:0.5em 2.1em;border:none;border-radius:1.5em;box-shadow:0 3px 13px 0 rgba(0,180,200,0.13);letter-spacing:0.04em;cursor:pointer;transition:all 0.15s;">
          Core Tools
        </button>
        <div class="universe-canvas">
          <img src="/static/images/fabric/one_lake.png"           class="universe-icon icon-main" alt="Fabric">
          <img src="/static/images/fabric/copilot.png"          class="universe-icon icon1" alt="Copilot">
          <img src="/static/images/fabric/dashboard.png"        class="universe-icon icon2" alt="Dashboard">
          <img src="/static/images/fabric/1_lakehouse.png"        class="universe-icon icon3" alt="Lakehouse">
          <img src="/static/images/fabric/data_warehouse.png"   class="universe-icon icon4" alt="Data Warehouse">
          <img src="/static/images/fabric/notebook.png"         class="universe-icon icon5" alt="Notebook">
          <img src="/static/images/fabric/dataflow.png"         class="universe-icon icon6" alt="Dataflow">
          <img src="/static/images/fabric/function_set.png"     class="universe-icon icon7" alt="Function Set">
          <img src="/static/images/fabric/scorecard.png"        class="universe-icon icon8" alt="Scorecard">
          <img src="/static/images/fabric/eventstream.png"      class="universe-icon icon9" alt="Eventstream">
          <img src="/static/images/fabric/experiments.png"      class="universe-icon icon10" alt="Experiments">
          <img src="/static/images/fabric/sql_database.png"     class="universe-icon icon11" alt="SQL Database">
          <img src="/static/images/fabric/databases.png"        class="universe-icon icon12" alt="Databases">
          <img src="/static/images/fabric/retail.png"           class="universe-icon icon13" alt="Retail">
          <img src="/static/images/fabric/semantic_model.png"   class="universe-icon icon14" alt="Semantic Model">
          <img src="/static/images/fabric/kql_database.png"     class="universe-icon icon15" alt="KQL Database">
          <img src="/static/images/fabric/environment.png"      class="universe-icon icon16" alt="Environment">
          <img src="/static/images/fabric/industry_solutions.png" class="universe-icon icon17" alt="Industry Solutions">
          <img src="/static/images/fabric/links.png"            class="universe-icon icon18" alt="Links">
          <img src="/static/images/fabric/real_time_dashboard.png" class="universe-icon icon19" alt="Real Time Dashboard">
          <img src="/static/images/fabric/streaming_dataflow.png" class="universe-icon icon20" alt="Streaming Dataflow">
          <img src="/static/images/fabric/variables.png"        class="universe-icon icon21" alt="Variables">
          <img src="/static/images/fabric/paginated_report.png" class="universe-icon icon22" alt="Paginated Report">
          <img src="/static/images/fabric/metric_sets.png"      class="universe-icon icon23" alt="Metric Sets">
          <img src="/static/images/fabric/exploration.png"      class="universe-icon icon24" alt="Exploration">
          <img src="/static/images/fabric/healthcare.png"       class="universe-icon icon25" alt="Healthcare">
          <img src="/static/images/fabric/reflex_exp.png"       class="universe-icon icon26" alt="Reflex">
          <img src="/static/images/fabric/event_house.png"      class="universe-icon icon27" alt="Event House">
          <img src="/static/images/fabric/datamart.png"         class="universe-icon icon28" alt="Datamart">
          <img src="/static/images/fabric/copy_job.png"         class="universe-icon icon29" alt="Copy Job">
          <img src="/static/images/fabric/pipeline.png" class="universe-icon icon30" alt="Pipeline">
        </div>
      </div>
    </section>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {

        gsap.to(".universe-title", { opacity: 1, y: 0, duration: 0.8, delay: 0.2, ease: "power3.out" });
        gsap.to(".demo-canvas-next", { opacity: 1, y: 0, duration: 0.8, stagger: 0.15, delay: 1.2, ease: "power3.out" });

        const icons = document.querySelectorAll('.universe-icon');
        const mainIcon = document.querySelector('.icon-main');

        // ✨ NEW: Function to add a continuous floating animation
        function addContinuousAnimation(element) {
            gsap.to(element, {
                y: `+=${gsap.utils.random(5, 12)}`, // Move up and down by a random amount
                x: `+=${gsap.utils.random(-8, 8)}`, // Move left and right by a random amount
                rotation: `+=${gsap.utils.random(-5, 5)}`, // Slightly rotate
                duration: gsap.utils.random(3, 5), // Random duration for each cycle
                ease: "sine.inOut",
                repeat: -1, // Loop forever
                yoyo: true // Animate back and forth smoothly
            });
        }

        function animateUniverseIcons() {
            // Animate the main icon
            gsap.fromTo(mainIcon,
                { scale: 0.3, rotation: -180, autoAlpha: 0 },
                {
                    scale: 1,
                    rotation: 0,
                    autoAlpha: 1,
                    duration: 1.2,
                    delay: 0.5,
                    ease: "power3.inOut",
                    onComplete: () => addContinuousAnimation(mainIcon) // ✨ NEW: Start floating after entrance
                }
            );

            // Animate the surrounding icons
            icons.forEach((icon, i) => {
                if (icon === mainIcon) return; // Skip the main icon, it's already handled

                gsap.fromTo(icon,
                    { // FROM
                        x: (mainIcon.offsetLeft - icon.offsetLeft) + (Math.random() - 0.5) * 60,
                        y: (mainIcon.offsetTop - icon.offsetTop) + (Math.random() - 0.5) * 60,
                        scale: 0.1,
                        rotation: gsap.utils.random(-270, 270),
                        autoAlpha: 0,
                    },
                    { // TO
                        x: 0,
                        y: 0,
                        scale: 1,
                        rotation: 0,
                        autoAlpha: 1,
                        duration: 1.6,
                        delay: 0.8 + i * 0.03,
                        ease: "elastic.out(1, 0.75)",
                        onComplete: () => addContinuousAnimation(icon) // ✨ NEW: Start floating after entrance
                    }
                );
            });
        }

        animateUniverseIcons();
    });

const highlightIcons = [
  ".icon3",  // Lakehouse
  ".icon5",  // Notebook
  ".icon6",  // Dataflow
  ".icon30", // Pipeline
  ".icon7",  // Function Set (Data function)
  ".icon11"  // SQL Database
];

let highlighted = false;

document.getElementById('highlight-fabric-stack').onclick = function() {
  highlighted = !highlighted;
  highlightIcons.forEach(selector => {
    const el = document.querySelector(selector);
    if (!el) return;
    if (highlighted) {
      el.classList.add('fabric-glow');
    } else {
      el.classList.remove('fabric-glow');
    }
  });
  // Optional: Change button text to indicate toggle state
  this.textContent = highlighted ? "Unhighlight Core Tools" : "Highlight Core Tools";
};
  </script>
</body>
</html>
