<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microsoft Fabric – Slide 1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; background:#f9fcff; }
    .blobs-bg { position:fixed; width:100vw; height:100vh; left:0; top:0; z-index:0;}
    .blob { position:absolute; border-radius:50%; opacity:.18; background:#6decd9; filter:blur(40px);}
    .blob:nth-child(1){width:370px; height:320px; left:13vw; top:9vh;}
    .blob:nth-child(2){width:220px; height:160px; left:65vw; top:7vh; background:#f6b3ff;}
    .blob:nth-child(3){width:150px; height:160px; left:8vw; top:62vh; background:#b9e9ff;}
    .blob:nth-child(4){width:280px; height:200px; left:61vw; top:65vh; background:#ffefd7;}
    .slides-container { width:100vw; min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:2;}
    .hero-card {
      background:rgba(255,255,255,0.98); border-radius:2.2em;
      padding:4.5em 3.5em; box-shadow:0 8px 48px #27edd010;
      min-width:340px; min-height:400px; display:flex; flex-direction:column; align-items:center; gap:1.4em;
      opacity: 0; transform: translateY(60px) scale(0.97);
    }
    .hero-title{
      font-size:3.9rem; font-weight:900;
      color:#0e8a9b; letter-spacing:-2.5px; text-align:center;
      text-shadow:0 2px 12px #a6e7f5a3;
    }
    .hero-subtitle{
      font-size:1.5rem; color:#57b1bd; font-weight:700; text-align:center;
    }
    .logo-img { width:110px; height:110px; margin-bottom:1.7em; }
    .start-btn, .demo-canvas-next {
      position: absolute;
      top: 2.3vh;
      right: 2.7vw;
      font-size: 1.08rem;
      font-weight: 600;
      background: linear-gradient(90deg, #17d6ba, #56c7ee);
      color: white;
      padding: 0.46em 1.5em;
      border: none;
      border-radius: 1.3em;
      cursor: pointer;
      box-shadow: 0 2px 8px 0 rgba(0, 214, 185, 0.09);
      opacity: 0;
      transform: translateY(-10px);
      letter-spacing: 0.03em;
      z-index: 10;
      transition: background 0.13s, filter 0.13s, box-shadow 0.16s, transform 0.16s;
    }
    .start-btn:hover, .demo-canvas-next:hover { filter: brightness(1.12); background: linear-gradient(90deg, #1ae2b4, #73d7ee);}
    .slide-indicator { margin-top:2.5em; color:#42b5bc; font-weight:600; font-size:1.28em; opacity: 0.93;}
    @media (max-width: 600px) {
      .hero-card{padding:2.2em 1em; min-width:0;}
      .logo-img{width:70px;height:70px;}
    }
  </style>
</head>
<body>
  <div class="blobs-bg">
    <div class="blob"></div><div class="blob"></div><div class="blob"></div><div class="blob"></div>
  </div>
  <div class="slides-container">
    <section class="slide active" id="slide-1">
      <!-- Start button at top-right, small and subtle -->
      <button class="start-btn" onclick="location.href='/present/slide-2'">Start ›</button>
      <div class="hero-card">
        <div class="hero-title">Microsoft Fabric</div>
        <div class="hero-subtitle">for Power BI Nerds</div>
        <img class="logo-img" src="/static/images/fabric/fabric.png" alt="Fabric Logo">
      </div>
    </section>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Animate the hero card in
    gsap.to(".hero-card", {
      opacity: 1,
      y: 0,
      scale: 1,
      duration: 0.95,
      ease: "power3.out",
      delay: 0.35
    });
    // Animate the Start button in
    gsap.to(".start-btn", {
      opacity: 1,
      y: 0,
      duration: 0.7,
      delay: 0.9,
      ease: "power2.out"
    });
  </script>
</body>
</html>
